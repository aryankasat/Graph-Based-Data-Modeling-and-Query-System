<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Graph System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/force-graph"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-nav">
        <div class="nav-left">
            <svg class="sidebar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span class="nav-breadcrumb">Mapping / <span class="nav-current">Order to Cash</span></span>
        </div>
    </div>

    <div class="app-container">
        <!-- Left Panel: Graph -->
        <div class="left-panel">
            <div class="floating-controls">
                <button class="btn-minimize">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg> Minimize
                </button>
                <button class="btn-overlay">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg> Hide Granular Overlay
                </button>
            </div>
            <div id="graph-container"></div>
            
            <!-- Custom Tooltip Node -->
            <div id="graph-tooltip" class="graph-tooltip" style="display: none;"></div>
        </div>
        
        <!-- Right Panel: Chat -->
        <div class="right-panel">
            <div class="chat-header">
                <h2>Chat with Graph</h2>
                <p>Order to Cash</p>
            </div>
            
            <div class="chat-history" id="chat-history">
                <!-- System Welcome -->
                <div class="message-wrapper system">
                    <div class="avatar-container">
                        <div class="system-avatar">D</div>
                    </div>
                    <div class="message-content-wrapper">
                        <div class="message-sender">
                            <strong>Dodge AI</strong><br><span>Graph Agent</span>
                        </div>
                        <div class="message system-message">
                            Hi! I can help you analyze the <strong>Order to Cash</strong> process.
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="chat-input-wrapper">
                <div class="status-indicator">
                    <div class="status-dot"></div> <span id="status-text">Dodge AI is awaiting instructions</span>
                </div>
                <div class="input-box">
                    <textarea id="chat-input" placeholder="Analyze anything..."></textarea>
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
